<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peregrino App</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #111;
  color: white;
}

.hero {
  position: relative;
  height: 100vh;
  width: 100%;
  overflow: hidden;
}

.hero img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.7));
}

.hero-content {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 0 20px;
  max-width: 900px;
  margin: auto;
}

.hero h1 {
  font-size: 3rem;
  font-weight: 600;
  margin-bottom: 20px;
  letter-spacing: -1px;
}

.hero p {
  font-size: 1.2rem;
  font-weight: 300;
  margin-bottom: 40px;
  opacity: 0.9;
}

.cta-button {
  padding: 14px 32px;
  font-size: 1rem;
  font-weight: 600;
  background: white;
  color: black;
  border-radius: 40px;
  text-decoration: none;
  transition: 0.3s ease;
}

.cta-button:hover {
  background: #e5e5e5;
}

@media (max-width: 768px) {
  .hero h1 {
    font-size: 2.2rem;
  }
  .hero p {
    font-size: 1rem;
  }
}
</style>
</head>

<body>

<section class="hero">
  <img src="hero-peregrino.jpg" alt="Guía del Peregrino sobre mesa con café y móvil">

  <div class="hero-content">
    <h1>La Guía del Peregrino.<br>Ahora en tu bolsillo.</h1>
    <p>Vive tu Cuarto Día con lo esencial siempre contigo.</p>
    <a href="#descargar" class="cta-button">Instala la app</a>
  </div>
</section>

</body>
</html>
